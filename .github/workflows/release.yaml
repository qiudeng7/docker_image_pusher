name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-binary:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: linux-amd64
          - os: macos-latest
            arch: darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install uv pyinstaller
          uv pip install --system fire requests python-dotenv aliyun-python-sdk-core aliyun-python-sdk-cr

      - name: Build binary
        run: |
          pyinstaller --onefile --name docker-image-pusher-${{ matrix.arch }} \
            --hidden-import=src.github \
            --hidden-import=src.github.file \
            --hidden-import=src.github.actions \
            --hidden-import=src.aliyun \
            --hidden-import=src.aliyun.registry \
            --hidden-import=aliyunsdkcr \
            --hidden-import=aliyunsdkcr.request.v20160607 \
            src/cli/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.arch }}
          path: dist/docker-image-pusher-${{ matrix.arch }}

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:latest,ghcr.io/${{ github.repository }}:${{ github.ref_name }}

  release:
    needs: [build-binary, build-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            binary-linux-amd64/docker-image-pusher-linux-amd64
            binary-darwin-arm64/docker-image-pusher-darwin-arm64
